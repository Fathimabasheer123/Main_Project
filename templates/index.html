<!DOCTYPE html>
<html>
<head>
    <title>MedChain - Blockchain Prescription System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="text-center">
            <h1>🏥 MedChain</h1>
            <p class="lead">AI-Assisted Blockchain E-Prescription System</p>
            <hr>
            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h3>👨‍⚕️</h3>
                            <h5>Doctor Portal</h5>
                            <p>Create AI-powered prescriptions</p>
                            <a href="/doctor/" class="btn btn-primary">Enter</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h3>👤</h3>
                            <h5>Patient Portal</h5>
                            <p>View your prescriptions</p>
                            <a href="/patient/" class="btn btn-success">Enter</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h3>🏥</h3>
                            <h5>Pharmacy</h5>
                            <p>Verify prescriptions</p>
                            <a href="/pharmacy/" class="btn btn-info">Enter</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-4 text-center">
            <p class="text-muted">✅ Blockchain: Working | 🔄 ML: Coming Soon</p>
        </div>
    </div>
</body>
</html>
